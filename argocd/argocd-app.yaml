apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/biswajitind/infra.git
    targetRevision: main
    path: argocd
    helm:
      chart: argo-cd
      repoURL: https://argoproj.github.io/argo-helm
      valueFiles:
        - values.yaml
    targetRevision: 9.1.0
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy: {}
  syncOptions:
    - CreateNamespace=true
