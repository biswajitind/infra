# This is the app of app CRD which needs to be applied once.
# after ArgoCD is deployed.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/biswajitind/infra.git
    targetRevision: main
    path: bootstrap/apps
    directory:
      recurse: true    

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
