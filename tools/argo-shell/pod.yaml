apiVersion: v1
kind: Pod
metadata:
  name: kubectl-shell
  namespace: headlamp
  labels:
    app: kubectl-shell
spec:
  serviceAccountName: headlampdmin
  containers:
    - name: kubectl
      image: bitnami/kubectl:latest
      command: ["/bin/sh", "-c"]
      args:
        - sleep infinity
      stdin: true
      tty: true
