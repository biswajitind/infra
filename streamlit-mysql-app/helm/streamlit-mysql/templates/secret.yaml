apiVersion: v1
kind: Secret
metadata:
  name: {{ include "streamlit-mysql.fullname" . }}-mysql
  labels:
    {{- include "streamlit-mysql.labels" . | nindent 4 }}
type: Opaque
stringData:
  mysql-root-password: {{ .Values.mysql.auth.rootPassword | quote }}
  mysql-password: {{ .Values.mysql.auth.password | quote }}
