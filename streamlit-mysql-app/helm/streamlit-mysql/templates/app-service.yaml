apiVersion: v1
kind: Service
metadata:
  name: {{ include "streamlit-mysql.fullname" . }}-app
  labels:
    {{- include "streamlit-mysql.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  type: {{ .Values.app.service.type }}
  ports:
    - port: {{ .Values.app.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: app
