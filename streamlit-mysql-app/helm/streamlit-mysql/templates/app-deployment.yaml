apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "streamlit-mysql.fullname" . }}-app
  labels:
    {{- include "streamlit-mysql.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: app
    spec:
      containers:
        - name: app
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          env:
            - name: DB_HOST
              value: {{ include "streamlit-mysql.fullname" . }}-mysql
            - name: DB_PORT
              value: {{ .Values.mysql.service.port | quote }}
            - name: DB_NAME
              value: {{ .Values.app.env.dbName | quote }}
            - name: DB_USER
              value: {{ .Values.app.env.dbUser | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "streamlit-mysql.fullname" . }}-mysql
                  key: mysql-password
          ports:
            - name: http
              containerPort: 8501
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
