apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: vault
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  sources:
    - repoURL: https://helm.releases.hashicorp.com
      chart: vault
      targetRevision: 0.27.0
      helm:
        valueFiles:
          - $values/vault/values.yaml

    - repoURL: https://github.com/biswajitind/infra.git
      targetRevision: main
      path: vault
      ref: values      

  syncPolicy: {}
