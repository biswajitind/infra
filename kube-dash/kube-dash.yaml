apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-dashboard
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://kubernetes.github.io/dashboard/
      chart: k8s-dashboard/kubernetes-dashboard
      targetRevision: 7.5.0
      helm:
        valueFiles:
          - $values/kube-dash/values.yaml

    - repoURL: https://github.com/biswajitind/infra.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: kubernetes-dashboard

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
